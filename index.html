<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Timesheet</title>

<style>
body { font-family: Arial; padding:10px; background:#f5f6fa; }

table { width:100%; border-collapse:collapse; background:white; }
th, td { border:1px solid #ddd; padding:6px; text-align:center; }

th { background:#2f3640; color:white; }

button {
    margin-top:10px;
    width:100%;
    padding:10px;
    font-size:16px;
}

.sum { background:#f1f2f6; font-weight:bold; }
</style>
</head>

<body>

<h2>Timesheet</h2>

<table>
<thead>
<tr>
<th>Имя</th>
<th>Должность</th>

<th colspan="4">Пн</th>
<th colspan="4">Вт</th>
<th colspan="4">Ср</th>
<th colspan="4">Чт</th>
<th colspan="4">Пт</th>
<th colspan="4">Сб</th>
<th colspan="4">Вс</th>

<th>WEEK</th>
<th>MONTH</th>
</tr>

<tr>
<th></th><th></th>

<!-- 7 дней -->
<th>S</th><th>P</th><th>E</th><th>H</th>
<th>S</th><th>P</th><th>E</th><th>H</th>
<th>S</th><th>P</th><th>E</th><th>H</th>
<th>S</th><th>P</th><th>E</th><th>H</th>
<th>S</th><th>P</th><th>E</th><th>H</th>
<th>S</th><th>P</th><th>E</th><th>H</th>
<th>S</th><th>P</th><th>E</th><th>H</th>

<th></th><th></th>
</tr>
</thead>

<tbody id="body"></tbody>
</table>

<button onclick="addRow()">➕ Добавить</button>

<script>

function addRow() {
    const body = document.getElementById("body");

    let row = "<tr>";

    row += `<td contenteditable="true">Имя</td>`;
    row += `<td contenteditable="true">TZ</td>`;

    for (let i = 0; i < 7; i++) {
        row += `
        <td contenteditable="true" oninput="recalc()">08:00</td>
        <td contenteditable="true" oninput="recalc()">01:30</td>
        <td contenteditable="true" oninput="recalc()">18:45</td>
        <td class="sum">0</td>
        `;
    }

    row += `<td class="week">0</td>`;
    row += `<td class="month">0</td>`;

    row += "</tr>";

    body.innerHTML += row;
}

// HH:MM → минуты
function toMin(t) {
    if (!t) return 0;
    let p = t.split(":");
    if (p.length !== 2) return 0;
    return (+p[0]) * 60 + (+p[1]);
}

// PAUSE тоже HH:MM
function pauseMin(t) {
    return toMin(t);
}

function recalc() {
    document.querySelectorAll("#body tr").forEach(row => {
        let cells = row.querySelectorAll("td");

        let offset = 2;
        let week = 0;

        for (let d = 0; d < 7; d++) {

            let start = cells[offset + d*4].innerText.trim();
            let pause = cells[offset + d*4 + 1].innerText.trim();
            let end   = cells[offset + d*4 + 2].innerText.trim();
            let out   = cells[offset + d*4 + 3];

            let diff =
                toMin(end) -
                toMin(start) -
                pauseMin(pause);

            if (diff < 0) diff = 0;

            let hours = diff / 60;

            out.innerText = hours.toFixed(2);

            week += hours;
        }

        let weekCell = cells[cells.length - 2];
        let monthCell = cells[cells.length - 1];

        weekCell.innerText = week.toFixed(2);
        monthCell.innerText = (week * 4).toFixed(2);
    });
}

addRow();

</script>

</body>
</html>
