<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arbeitsplan</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { font-family: -apple-system, Arial; background:#f5f6fa; padding:10px; }
h2 { text-align:center; }

table { width:100%; border-collapse:collapse; background:#fff; }
th { background:#2f3640; color:#fff; padding:8px; font-size:12px; }
td { border:1px solid #ddd; text-align:center; }

input { width:100%; border:none; text-align:center; padding:6px; }

button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#273c75;
  color:white;
  font-size:16px;
}
.delete { background:#c23616; }
</style>
</head>

<body>

<h2>Wochenplan</h2>

<table>
<thead>
<tr>
<th>Name</th>
<th>Position</th>
<th>Mo</th><th>Di</th><th>Mi</th><th>Do</th><th>Fr</th><th>Sa</th><th>So</th>
<th>Stunden</th>
<th>Aktion</th>
</tr>
</thead>

<tbody id="tbody"></tbody>
</table>

<button id="add">➕ Mitarbeiter</button>
<button id="excel">📥 Excel herunterladen</button>

<script>
let data = JSON.parse(localStorage.getItem("plan") || "[]");

if (data.length === 0) {
  data.push({
    name: "",
    role: "Mitarbeiter",
    days: [0,0,0,0,0,0,0]
  });
}

function save() {
  localStorage.setItem("plan", JSON.stringify(data));
}

function sum(days) {
  return days.reduce((a,b)=>a+b,0);
}

function render() {
  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";

  data.forEach((row, i) => {
    const tr = document.createElement("tr");

    let html = `
      <td><input value="${row.name}" data-i="${i}" data-type="name"></td>
      <td><input value="${row.role}" data-i="${i}" data-type="role"></td>
    `;

    row.days.forEach((d, di) => {
      html += <td><input type="number" value="${d}" data-i="${i}" data-di="${di}" class="day"></td>;
    });

    html += `
      <td>${sum(row.days)}</td>
      <td><button class="delete" data-del="${i}">X</button></td>
    `;

    tr.innerHTML = html;
    tbody.appendChild(tr);
  });
}

document.addEventListener("input", (e) => {
  const i = e.target.dataset.i;

  if (e.target.dataset.type === "name") {
    data[i].name = e.target.value;
  }

  if (e.target.dataset.type === "role") {
    data[i].role = e.target.value;
  }

  if (e.target.classList.contains("day")) {
    const di = e.target.dataset.di;
    data[i].days[di] = Number(e.target.value) || 0;
  }

  save();
});

document.addEventListener("click", (e) => {
  if (e.target.id === "add") {
    data.push({
      name:"",
      role:"Mitarbeiter",
      days:[0,0,0,0,0,0,0]
    });
    save();
    render();
  }

  if (e.target.dataset.del !== undefined) {
    data.splice(e.target.dataset.del, 1);
    save();
    render();
  }

  if (e.target.id === "excel") {
    const wb = XLSX.utils.book_new();

    const ws = XLSX.utils.json_to_sheet(
      data.map(r => ({
        Name:r.name,
        Position:r.role,
        Mo:r.days[0],
        Di:r.days[1],
        Mi:r.days[2],
        Do:r.days[3],
        Fr:r.days[4],
        Sa:r.days[5],
        So:r.days[6],
        Stunden:sum(r.days)
      }))
    );

    XLSX.utils.book_append_sheet(wb, ws, "Plan");
    XLSX.writeFile(wb, "arbeitsplan.xlsx");
  }
});

render();
</script>

</body>
</html>
