<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arbeitsplan</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{
  font-family:-apple-system,Arial;
  background:#f5f6fa;
  padding:10px;
}

h2{text-align:center;}

table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
}

th{
  background:#2f3640;
  color:#fff;
  font-size:12px;
  padding:6px;
}

td{
  border:1px solid #ddd;
  text-align:center;
}

input{
  width:100%;
  border:none;
  text-align:center;
  padding:6px;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#273c75;
  color:#fff;
  font-size:16px;
}

.delete{
  background:#c23616;
}
tfoot{
  background:#dcdde1;
  font-weight:bold;
}
</style>
</head>

<body>

<h2>Wochenplan</h2>

<table>
<thead>
<tr>
<th>Name</th>
<th>Position</th>
<th>Mo</th><th>Di</th><th>Mi</th><th>Do</th><th>Fr</th><th>Sa</th><th>So</th>
<th>Pause (Std.)</th>
<th>Stunden</th>
<th>Aktion</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

<tfoot>
<tr>
<td colspan="10">Gesamtstunden (alle Mitarbeiter)</td>
<td id="totalHours">0</td>
<td></td>
</tr>
</tfoot>

</table>

<button onclick="addRow()">➕ Mitarbeiter</button>
<button onclick="exportExcel()">📥 Excel herunterladen</button>

<script>

let data = JSON.parse(localStorage.getItem("plan") || "[]");

if(data.length === 0){
  data = [{
    name:"",
    role:"Mitarbeiter",
    days:[0,0,0,0,0,0,0],
    pause:1
  }];
}

function save(){
  localStorage.setItem("plan", JSON.stringify(data));
}

function sum(days){
  return days.reduce((a,b)=>a+b,0);
}

function totalAll(){
  return data.reduce((a,r)=>a + sum(r.days), 0);
}

function render(){
  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";

  data.forEach((row,i)=>{
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td><input value="${row.name}" oninput="data[${i}].name=this.value;save()"></td>
      <td><input value="${row.role}" oninput="data[${i}].role=this.value;save()"></td>

      <td><input type="number" value="${row.days[0]}" oninput="data[${i}].days[0]=+this.value;save();updateTotal()"></td>
      <td><input type="number" value="${row.days[1]}" oninput="data[${i}].days[1]=+this.value;save();updateTotal()"></td>
      <td><input type="number" value="${row.days[2]}" oninput="data[${i}].days[2]=+this.value;save();updateTotal()"></td>
      <td><input type="number" value="${row.days[3]}" oninput="data[${i}].days[3]=+this.value;save();updateTotal()"></td>
      <td><input type="number" value="${row.days[4]}" oninput="data[${i}].days[4]=+this.value;save();updateTotal()"></td>
      <td><input type="number" value="${row.days[5]}" oninput="data[${i}].days[5]=+this.value;save();updateTotal()"></td>
      <td><input type="number" value="${row.days[6]}" oninput="data[${i}].days[6]=+this.value;save();updateTotal()"></td>

      <td><input type="number" value="${row.pause}" oninput="data[${i}].pause=+this.value;save()"></td>

      <td>${sum(row.days) - (row.pause || 0)}</td>
      <td><button class="delete" onclick="deleteRow(${i})">X</button></td>
    `;

    tbody.appendChild(tr);
  });

  updateTotal();
}

function updateTotal(){
  document.getElementById("totalHours").innerText = totalAll();
}

function addRow(){
  data.push({
    name:"",
    role:"Mitarbeiter",
    days:[0,0,0,0,0,0,0],
    pause:1
  });

  save();
  render();
}

function deleteRow(i){
  data.splice(i,1);
  save();
  render();
}

function exportExcel(){
  const wb = XLSX.utils.book_new();

  const ws = XLSX.utils.json_to_sheet(
    data.map(r=>({
      Name:r.name,
      Position:r.role,
      Mo:r.days[0],
      Di:r.days[1],
      Mi:r.days[2],
      Do:r.days[3],
      Fr:r.days[4],
      Sa:r.days[5],
      So:r.days[6],
      Pause:r.pause,
      Stunden:sum(r.days) - (r.pause || 0)
    }))
  );

  XLSX.utils.book_append_sheet(wb, ws, "Plan");
  XLSX.writeFile(wb, "arbeitsplan.xlsx");
}

render();

</script>
</body>
</html>
