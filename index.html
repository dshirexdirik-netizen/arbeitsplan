<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Shift Plan</title>

<style>
body { font-family: Arial; padding:10px; }
table { width:100%; border-collapse:collapse; }
td, th { border:1px solid #ddd; padding:6px; text-align:center; }
th { background:#2f3640; color:#fff; }
.sum { background:#f1f2f6; font-weight:bold; }
</style>
</head>

<body>

<table>
<thead>
<tr>
<th>Имя</th>
<th>Должность</th>
<th colspan="4">Пн</th>
<th colspan="4">Вт</th>
<th colspan="4">Ср</th>
<th colspan="4">Чт</th>
<th colspan="4">Пт</th>
<th colspan="4">Сб</th>
<th colspan="4">Вс</th>
</tr>

<tr>
<th></th><th></th>

<th>B</th><th>P</th><th>E</th><th>S</th>
<th>B</th><th>P</th><th>E</th><th>S</th>
<th>B</th><th>P</th><th>E</th><th>S</th>
<th>B</th><th>P</th><th>E</th><th>S</th>
<th>B</th><th>P</th><th>E</th><th>S</th>
<th>B</th><th>P</th><th>E</th><th>S</th>
<th>B</th><th>P</th><th>E</th><th>S</th>

</tr>
</thead>

<tbody id="body"></tbody>
</table>

<button onclick="addRow()">Добавить</button>

<script>

function addRow() {
    const body = document.getElementById("body");

    let row = "<tr>";

    row += `<td contenteditable="true">Имя</td>`;
    row += `<td contenteditable="true">TZ</td>`;

    for (let i = 0; i < 7; i++) {
        row += `
        <td contenteditable="true" oninput="recalc()">08:00</td>
        <td contenteditable="true" oninput="recalc()">0</td>
        <td contenteditable="true" oninput="recalc()">17:00</td>
        <td class="sum">0</td>
        `;
    }

    row += "</tr>";

    body.innerHTML += row;
}

function toMin(t) {
    if (!t) return 0;
    let [h,m] = t.split(":").map(Number);
    return h*60+m;
}

function recalc() {
    document.querySelectorAll("#body tr").forEach(row => {
        let cells = row.querySelectorAll("td");

        let offset = 2;

        for (let d = 0; d < 7; d++) {
            let b = cells[offset + d*4].innerText;
            let p = cells[offset + d*4 + 1].innerText;
            let e = cells[offset + d*4 + 2].innerText;
            let s = cells[offset + d*4 + 3];

            let total = toMin(e) - toMin(b) - (parseInt(p)||0);

            s.innerText = total > 0 ? (total/60).toFixed(2) : "0";
        }
    });
}

addRow();

</script>

</body>
</html>
