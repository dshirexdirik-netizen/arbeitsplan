<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Shift System</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { font-family: Arial; padding:10px; background:#f5f6fa; }

table { width:100%; border-collapse:collapse; background:white; }
th, td { border:1px solid #ddd; padding:6px; text-align:center; }

th { background:#2f3640; color:white; }

.sum, .week, .month { background:#f1f2f6; font-weight:bold; }

button {
    margin-top:10px;
    width:100%;
    padding:10px;
    font-size:16px;
}
</style>
</head>

<body>

<h2>План смен</h2>

<table id="table">
<thead>
<tr>
<th>Имя</th>
<th>Должность</th>

<th colspan="4">Пн</th>
<th colspan="4">Вт</th>
<th colspan="4">Ср</th>
<th colspan="4">Чт</th>
<th colspan="4">Пт</th>
<th colspan="4">Сб</th>
<th colspan="4">Вс</th>

<th>WOCHE</th>
<th>MONAT</th>
</tr>

<tr>
<th></th><th></th>

<!-- 7 дней -->
<th>B</th><th>P</th><th>E</th><th>S</th>
<th>B</th><th>P</th><th>E</th><th>S</th>
<th>B</th><th>P</th><th>E</th><th>S</th>
<th>B</th><th>P</th><th>E</th><th>S</th>
<th>B</th><th>P</th><th>E</th><th>S</th>
<th>B</th><th>P</th><th>E</th><th>S</th>
<th>B</th><th>P</th><th>E</th><th>S</th>

<th></th><th></th>
</tr>
</thead>

<tbody id="body"></tbody>
</table>

<button onclick="addRow()">➕ Добавить</button>
<button onclick="exportExcel()">📥 Excel</button>
<button onclick="clearAll()">🗑 Очистить</button>

<script>

function addRow() {
    const body = document.getElementById("body");

    let row = "<tr>";

    row += `<td contenteditable="true">Имя</td>`;
    row += `<td contenteditable="true">TZ</td>`;

    for (let i = 0; i < 7; i++) {
        row += `
        <td contenteditable="true" oninput="recalc()">08:00</td>
        <td contenteditable="true" oninput="recalc()">30</td>
        <td contenteditable="true" oninput="recalc()">17:00</td>
        <td class="sum">0</td>
        `;
    }

    row += `<td class="week">0</td>`;
    row += `<td class="month">0</td>`;

    row += "</tr>";

    body.innerHTML += row;

    save();
}

function timeToMin(t) {
    if (!t) return 0;
    let [h,m] = t.split(":").map(Number);
    return h*60 + m;
}

function recalc() {
    document.querySelectorAll("#body tr").forEach(row => {
        let cells = row.querySelectorAll("td");

        let offset = 2;
        let week = 0;

        for (let d = 0; d < 7; d++) {

            let b = cells[offset + d*4].innerText.trim();
            let p = parseInt(cells[offset + d*4 + 1].innerText.trim()) || 0;
            let e = cells[offset + d*4 + 2].innerText.trim();
            let s = cells[offset + d*4 + 3];

            let start = timeToMin(b);
            let end = timeToMin(e);

            let total = end - start - p;

            let hours = total > 0 ? total / 60 : 0;

            s.innerText = hours.toFixed(2);

            week += hours;
        }

        let weekCell = cells[cells.length - 2];
        let monthCell = cells[cells.length - 1];

        weekCell.innerText = week.toFixed(2);
        monthCell.innerText = (week * 4).toFixed(2);
    });

    save();
}

function save() {
    localStorage.setItem("shift_data", document.getElementById("body").innerHTML);
}

function load() {
    let data = localStorage.getItem("shift_data");
    if (data) {
        document.getElementById("body").innerHTML = data;
    } else {
        addRow();
    }
}

function exportExcel() {
    let table = document.getElementById("table");
    let wb = XLSX.utils.table_to_book(table, { sheet: "Shifts" });
    XLSX.writeFile(wb, "shifts.xlsx");
}

function clearAll() {
    localStorage.removeItem("shift_data");
    document.getElementById("body").innerHTML = "";
    addRow();
}

document.addEventListener("input", recalc);

load();

</script>

</body>
</html>
