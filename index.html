<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>MEP Plan</title>

<style>
body{
  font-family:Arial;
  padding:10px;
}

table{
  border-collapse:collapse;
  width:100%;
}

td, th{
  border:1px solid #000;
  text-align:center;
  font-size:12px;
  padding:4px;
}

input{
  width:100%;
  border:none;
  text-align:center;
}

.header{
  font-weight:bold;
}

</style>
</head>

<body>

<h3>Mitarbeiter-Einsatz-Planung (MEP)</h3>

<table id="table">
<thead>
<tr class="header">
<td>Name</td>
<td>Funktion</td>
<td>Mo</td>
<td>Di</td>
<td>Mi</td>
<td>Do</td>
<td>Fr</td>
<td>Sa</td>
<td>So</td>
<td>Summe Woche</td>
</tr>
</thead>

<tbody id="tbody"></tbody>

<tfoot>
<tr>
<td colspan="9">Gesamt (alle Mitarbeiter)</td>
<td id="totalAll">0</td>
</tr>
</tfoot>

</table>

<button onclick="addRow()">+ Mitarbeiter</button>

<script>

let data = [];

function createDay(){
  return {start:"", end:"", pause:0};
}

function addRow(){
  data.push({
    name:"",
    role:"",
    days:[createDay(),createDay(),createDay(),createDay(),createDay(),createDay(),createDay()]
  });
  render();
}

function timeToNumber(t){
  if(!t) return 0;
  const [h,m] = t.split(":");
  return Number(h) + Number(m)/60;
}

function calcDay(d){
  const start = timeToNumber(d.start);
  const end = timeToNumber(d.end);
  if(end <= start) return 0;
  return Math.max(0, end - start - (d.pause || 0));
}

function calcWeek(row){
  return row.days.reduce((a,d)=>a+calcDay(d),0);
}

function render(){
  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";

  data.forEach((row,i)=>{
    const tr = document.createElement("tr");

    let html = `
      <td><input value="${row.name}" oninput="data[${i}].name=this.value"></td>
      <td><input value="${row.role}" oninput="data[${i}].role=this.value"></td>
    `;

    row.days.forEach((d,di)=>{
      html += `
      <td>
        <input type="time" value="${d.start}" onchange="data[${i}].days[${di}].start=this.value;update()">
        <input type="time" value="${d.end}" onchange="data[${i}].days[${di}].end=this.value;update()">
        <input type="number" min="0" max="5" value="${d.pause}" 
        onchange="data[${i}].days[${di}].pause=Number(this.value)||0;update()">
        <div id="day-${i}-${di}">0</div>
      </td>
      `;
    });

    html += `<td id="week-${i}">0</td>`;

    tr.innerHTML = html;
    tbody.appendChild(tr);
  });

  update();
}

function update(){
  let total = 0;

  data.forEach((row,i)=>{
    let week = 0;

    row.days.forEach((d,di)=>{
      const h = calcDay(d);
      week += h;

      const el = document.getElementById(`day-${i}-${di}`);
      if(el) el.innerText = h.toFixed(2);
    });

    total += week;

    const w = document.getElementById(`week-${i}`);
    if(w) w.innerText = week.toFixed(2);
  });

  document.getElementById("totalAll").innerText = total.toFixed(2);
}

addRow();

</script>

</body>
</html>
