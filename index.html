<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arbeitsplan</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{
  font-family:-apple-system,Arial;
  background:#f5f6fa;
  padding:10px;
}

h2{text-align:center;}

table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
}

th{
  background:#2f3640;
  color:#fff;
  font-size:12px;
  padding:6px;
}

td{
  border:1px solid #ddd;
  text-align:center;
}

tbody tr:nth-child(even){
  background:#f1f2f6;
}

tr:hover{
  background:#dcdde1;
}

input{
  width:100%;
  border:none;
  text-align:center;
  padding:6px;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#273c75;
  color:#fff;
  font-size:16px;
  cursor:pointer;
}

.delete{
  background:#c23616;
}

tfoot{
  background:#dcdde1;
  font-weight:bold;
}
</style>
</head>

<body>

<h2>Wochenplan</h2>

<table>
<thead>
<tr>
<th>Name</th>
<th>Position</th>
<th>Mo</th><th>Di</th><th>Mi</th><th>Do</th><th>Fr</th><th>Sa</th><th>So</th>
<th>Pause</th>
<th>Stunden</th>
<th>Aktion</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

<tfoot>
<tr>
<td colspan="10">Общие часы</td>
<td id="totalHours">0</td>
<td></td>
</tr>

<tr>
<td colspan="10">Общая пауза</td>
<td id="totalPause">0</td>
<td></td>
</tr>
</tfoot>

</table>

<button onclick="addRow()">➕ Mitarbeiter</button>
<button onclick="exportExcel()">📥 Excel</button>

<script>

let data = JSON.parse(localStorage.getItem("plan") || "[]");

if(data.length === 0){
  data = [{
    name:"",
    role:"Mitarbeiter",
    days:[0,0,0,0,0,0,0],
    pause:1
  }];
}

function save(){
  localStorage.setItem("plan", JSON.stringify(data));
}

function sum(days){
  return days.reduce((a,b)=>a+b,0);
}

function calcRow(row){
  const total = sum(row.days);
  const pause = total > 0 ? (row.pause || 0) : 0;
  return Math.max(0, total - pause);
}

function totalPause(){
  return data.reduce((a,r)=>{
    const worked = sum(r.days);
    return a + (worked > 0 ? (r.pause || 0) : 0);
  },0);
}

function render(){
  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";

  data.forEach((row,i)=>{
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td><input value="${row.name}" oninput="data[${i}].name=this.value;save()"></td>
      <td><input value="${row.role}" oninput="data[${i}].role=this.value;save()"></td>

      ${row.days.map((d,di)=>`
        <td>
          <input type="number" min="0" max="24" value="${d}"
          oninput="
            data[${i}].days[${di}]=Number(this.value)||0;
            save();
            update();
          ">
        </td>
      `).join("")}

      <td>
        <input type="number" min="0" max="12" value="${row.pause}"
        oninput="
          data[${i}].pause=Number(this.value)||0;
          save();
          update();
        ">
      </td>

      <td id="hours-${i}">${calcRow(row)}</td>
      <td><button class="delete" onclick="deleteRow(${i})">X</button></td>
    `;

    tbody.appendChild(tr);
  });

  update();
}

function update(){
  let total = 0;
  let pauseTotal = 0;

  data.forEach((row,i)=>{
    const hours = calcRow(row);
    total += hours;

    const worked = sum(row.days);
    if(worked > 0){
      pauseTotal += (row.pause || 0);
    }

    const el = document.getElementById(`hours-${i}`);
    if(el) el.innerText = hours;
  });

  document.getElementById("totalHours").innerText = total;
  document.getElementById("totalPause").innerText = pauseTotal;
}

function addRow(){
  data.push({
    name:"",
    role:"Mitarbeiter",
    days:[0,0,0,0,0,0,0],
    pause:1
  });

  save();
  render();
}

function deleteRow(i){
  data.splice(i,1);
  save();
  render();
}

function exportExcel(){
  const wb = XLSX.utils.book_new();

  const ws = XLSX.utils.json_to_sheet(
    data.map(r=>({
      Name:r.name,
      Position:r.role,
      Mo:r.days[0],
      Di:r.days[1],
      Mi:r.days[2],
      Do:r.days[3],
      Fr:r.days[4],
      Sa:r.days[5],
      So:r.days[6],
      Pause:r.pause,
      Stunden:calcRow(r)
    }))
  );

  XLSX.utils.book_append_sheet(wb, ws, "Plan");
  XLSX.writeFile(wb, "arbeitsplan.xlsx");
}

render();

</script>

</body>
</html>
