<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Shift System (minutes)</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { font-family: Arial; padding:10px; background:#f5f6fa; }

table { width:100%; border-collapse:collapse; background:white; }
th, td { border:1px solid #ddd; padding:6px; text-align:center; }

th { background:#2f3640; color:white; }

.week, .month { background:#f1f2f6; font-weight:bold; }

button {
    margin-top:10px;
    width:100%;
    padding:10px;
    font-size:16px;
}
</style>
</head>

<body>

<h2>План смен (в минутах)</h2>

<table id="table">
<thead>
<tr>
<th>Имя</th>
<th>Должность</th>

<!-- 7 дней -->
<th colspan="4">Пн</th>
<th colspan="4">Вт</th>
<th colspan="4">Ср</th>
<th colspan="4">Чт</th>
<th colspan="4">Пт</th>
<th colspan="4">Сб</th>
<th colspan="4">Вс</th>

<th>WOCHE</th>
<th>MONAT</th>
</tr>

<tr>
<th></th><th></th>

<!-- 7 дней × (B P E S) -->
<th>B</th><th>P</th><th>E</th><th>S</th>
<th>B</th><th>P</th><th>E</th><th>S</th>
<th>B</th><th>P</th><th>E</th><th>S</th>
<th>B</th><th>P</th><th>E</th><th>S</th>
<th>B</th><th>P</th><th>E</th><th>S</th>
<th>B</th><th>P</th><th>E</th><th>S</th>
<th>B</th><th>P</th><th>E</th><th>S</th>

<th></th><th></th>
</tr>
</thead>

<tbody id="body"></tbody>
</table>

<button onclick="addRow()">➕ Добавить</button>
<button onclick="exportExcel()">📥 Excel</button>

<script>

function addRow() {
    const body = document.getElementById("body");

    let row = "<tr>";

    row += `<td contenteditable="true">Имя</td>`;
    row += `<td contenteditable="true">TZ</td>`;

    for (let i = 0; i < 7; i++) {
        row += `
        <td contenteditable="true" oninput="recalc()">08:00</td>
        <td contenteditable="true" oninput="recalc()">30</td>
        <td contenteditable="true" oninput="recalc()">17:00</td>
        <td>0</td>
        `;
    }

    row += `<td class="week">0</td>`;
    row += `<td class="month">0</td>`;

    row += "</tr>";

    body.innerHTML += row;
}

function toMin(t) {
    if (!t) return 0;
    let p = t.split(":");
    if (p.length !== 2) return 0;
    return (+p[0]) * 60 + (+p[1]);
}

function recalc() {
    document.querySelectorAll("#body tr").forEach(row => {
        let cells = row.querySelectorAll("td");

        let offset = 2;
        let week = 0;

        for (let d = 0; d < 7; d++) {

            let b = cells[offset + d*4].innerText.trim();
            let p = parseInt(cells[offset + d*4 + 1].innerText.trim()) || 0;
            let e = cells[offset + d*4 + 2].innerText.trim();
            let s = cells[offset + d*4 + 3];

            let start = toMin(b);
            let end = toMin(e);

            let diff = end - start - p;

            if (diff < 0) diff = 0;

            s.innerText = diff; // 🔥 МИНУТЫ

            week += diff;
        }

        let weekCell = cells[cells.length - 2];
        let monthCell = cells[cells.length - 1];

        weekCell.innerText = week;
        monthCell.innerText = week * 4;
    });
}

function exportExcel() {
    let table = document.getElementById("table");
    let wb = XLSX.utils.table_to_book(table, { sheet: "Shifts" });
    XLSX.writeFile(wb, "shifts.xlsx");
}

addRow();

</script>

</body>
</html>
