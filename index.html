index.html
<script>

let data = JSON.parse(localStorage.getItem("plan") || "[]");

if (data.length === 0) {
  data = [{
    name:"",
    role:"Mitarbeiter",
    days:[0,0,0,0,0,0,0]
  }];
}

function save(){
  localStorage.setItem("plan", JSON.stringify(data));
}

function sum(days){
  return days.reduce((a,b)=>a+b,0);
}

function render(){
  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";

  data.forEach((row,i)=>{
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td><input value="${row.name}" oninput="data[${i}].name=this.value;save()"></td>
      <td><input value="${row.role}" oninput="data[${i}].role=this.value;save()"></td>

      <td><input type="number" value="${row.days[0]}" oninput="data[${i}].days[0]=+this.value;save()"></td>
      <td><input type="number" value="${row.days[1]}" oninput="data[${i}].days[1]=+this.value;save()"></td>
      <td><input type="number" value="${row.days[2]}" oninput="data[${i}].days[2]=+this.value;save()"></td>
      <td><input type="number" value="${row.days[3]}" oninput="data[${i}].days[3]=+this.value;save()"></td>
      <td><input type="number" value="${row.days[4]}" oninput="data[${i}].days[4]=+this.value;save()"></td>
      <td><input type="number" value="${row.days[5]}" oninput="data[${i}].days[5]=+this.value;save()"></td>
      <td><input type="number" value="${row.days[6]}" oninput="data[${i}].days[6]=+this.value;save()"></td>

      <td>${sum(row.days)}</td>
      <td><button onclick="remove(${i})">X</button></td>
    `;

    tbody.appendChild(tr);
  });
}

function add(){
  data.push({
    name:"",
    role:"Mitarbeiter",
    days:[0,0,0,0,0,0,0]
  });

  save();
  render();
}

function remove(i){
  data.splice(i,1);
  save();
  render();
}

function exportExcel(){
  const wb = XLSX.utils.book_new();

  const ws = XLSX.utils.json_to_sheet(
    data.map(r=>({
      Name:r.name,
      Position:r.role,
      Mo:r.days[0],
      Di:r.days[1],
      Mi:r.days[2],
      Do:r.days[3],
      Fr:r.days[4],
      Sa:r.days[5],
      So:r.days[6],
      Stunden:sum(r.days)
    }))
  );

  XLSX.utils.book_append_sheet(wb, ws, "Plan");
  XLSX.writeFile(wb, "arbeitsplan.xlsx");
}

document.getElementById("addBtn").onclick = add;
document.getElementById("excelBtn").onclick = exportExcel;

render();

</script>
