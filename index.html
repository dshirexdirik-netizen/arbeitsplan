<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Arbeitszeitplan</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { font-family: Arial; padding:10px; background:#f5f6fa; }

table { width:100%; border-collapse:collapse; background:white; }
th, td { border:1px solid #ddd; padding:6px; text-align:center; }

th { background:#2f3640; color:white; }

button {
    margin-top:10px;
    width:100%;
    padding:10px;
    font-size:16px;
}
</style>
</head>

<body>

<h2>Arbeitszeitplan</h2>

<table id="table">
<thead>
<tr>
<th>Name</th>
<th>Position</th>

<th colspan="4">Mo</th>
<th colspan="4">Di</th>
<th colspan="4">Mi</th>
<th colspan="4">Do</th>
<th colspan="4">Fr</th>
<th colspan="4">Sa</th>
<th colspan="4">So</th>

<th>WOCHE</th>
<th>MONAT</th>
</tr>

<tr>
<th></th><th></th>

<th>Start</th><th>Pause</th><th>Ende</th><th>Std</th>
<th>Start</th><th>Pause</th><th>Ende</th><th>Std</th>
<th>Start</th><th>Pause</th><th>Ende</th><th>Std</th>
<th>Start</th><th>Pause</th><th>Ende</th><th>Std</th>
<th>Start</th><th>Pause</th><th>Ende</th><th>Std</th>
<th>Start</th><th>Pause</th><th>Ende</th><th>Std</th>
<th>Start</th><th>Pause</th><th>Ende</th><th>Std</th>

<th></th><th></th>
</tr>
</thead>

<tbody id="body"></tbody>
</table>

<button onclick="addRow()">➕ Mitarbeiter hinzufügen</button>
<button onclick="exportExcel()">📥 Excel Export</button>

<script>

function toMin(t) {
    if (!t) return 0;
    let p = t.split(":");
    if (p.length !== 2) return 0;
    return (+p[0]) * 60 + (+p[1]);
}

function addRow() {
    const body = document.getElementById("body");

    let row = "<tr>";

    row += `<td contenteditable="true">Name</td>`;
    row += `<td contenteditable="true">TZ</td>`;

    for (let i = 0; i < 7; i++) {
        row += `
        <td contenteditable="true" oninput="recalc()">08:00</td>
        <td contenteditable="true" oninput="recalc()">01:30</td>
        <td contenteditable="true" oninput="recalc()">18:00</td>
        <td>0</td>
        `;
    }

    row += `<td>0</td>`;
    row += `<td>0</td>`;

    row += "</tr>";

    body.innerHTML += row;
}

function recalc() {
    document.querySelectorAll("#body tr").forEach(row => {
        let cells = row.querySelectorAll("td");

        let offset = 2;
        let weekMin = 0;

        for (let d = 0; d < 7; d++) {

            let start = cells[offset + d*4].innerText.trim();
            let pause = cells[offset + d*4 + 1].innerText.trim();
            let end   = cells[offset + d*4 + 2].innerText.trim();
            let out   = cells[offset + d*4 + 3];

            let pauseMin = pause.includes(":")
                ? toMin(pause)
                : (parseInt(pause) || 0);

            let diff = toMin(end) - toMin(start) - pauseMin;

            if (diff < 0) diff = 0;

            let hours = diff / 60;

            out.innerText = hours.toFixed(2);

            weekMin += diff;
        }

        let weekCell = cells[cells.length - 2];
        let monthCell = cells[cells.length - 1];

        // 🔥 FIX: jetzt in STUNDEN, nicht Minuten
        weekCell.innerText = (weekMin / 60).toFixed(2);
        monthCell.innerText = ((weekMin / 60) * 4).toFixed(2);
    });
}

function exportExcel() {
    let table = document.getElementById("table");

    let wb = XLSX.utils.book_new();
    let ws = XLSX.utils.table_to_sheet(table);

    XLSX.utils.book_append_sheet(wb, ws, "Arbeitszeit");

    XLSX.writeFile(wb, "arbeitszeit.xlsx");
}

addRow();

</script>

</body>
</html>
