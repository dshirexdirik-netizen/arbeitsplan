<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>План смен</title>

<style>
body { font-family: Arial; background:#f5f6fa; padding:10px; }
h2 { text-align:center; }

table { width:100%; border-collapse:collapse; background:#fff; }
th, td { border:1px solid #ddd; padding:6px; text-align:center; }

th { background:#2f3640; color:#fff; }

.name { background:#eaeef2; font-weight:bold; }
.role { background:#dcdde1; }

.day-btn {
    background:#f1f2f6;
    cursor:pointer;
}

button {
    margin-top:10px;
    width:100%;
    padding:10px;
    font-size:16px;
}
</style>
</head>

<body>

<h2>План смен</h2>

<table>
<thead>
<tr>
<th>Имя</th>
<th>Должность</th>
<th>Пн</th>
<th>Вт</th>
<th>Ср</th>
<th>Чт</th>
<th>Пт</th>
<th>Сб</th>
<th>Вс</th>
</tr>
</thead>

<tbody id="body"></tbody>
</table>

<button onclick="addRow()">➕ Добавить</button>

<script>

const days = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

function addRow(data = {}) {
    const body = document.getElementById("body");

    let row = `<tr>
        <td class="name" contenteditable="true">${data.name || "Имя"}</td>
        <td class="role" contenteditable="true">${data.role || "TZ"}</td>`;

    for (let d = 0; d < 7; d++) {
        let val = data[days[d]] || "";
        row += `<td class="day-btn" onclick="editDay(this, ${d})">${val}</td>`;
    }

    row += "</tr>";

    body.innerHTML += row;
}

// окно редактирования дня
function editDay(cell, dayIndex) {
    let current = cell.innerText.split("|");

    let start = prompt("BEGINN (HH:MM)", current[0] || "");
    let pause = prompt("PAUSE (мин)", current[1] || "0");
    let end   = prompt("ENDE (HH:MM)", current[2] || "");

    if (!start || !end) return;

    let sum = calcHours(start, pause, end);

    cell.innerText = `${start} | ${pause}m | ${end} | ${sum}h`;

    save();
}

function calcHours(start, pause, end) {
    let [sh, sm] = start.split(":").map(Number);
    let [eh, em] = end.split(":").map(Number);

    let startMin = sh * 60 + sm;
    let endMin = eh * 60 + em;

    let pauseMin = parseInt(pause || 0);

    let diff = endMin - startMin - pauseMin;

    return (diff / 60).toFixed(2);
}

// сохранение
function save() {
    localStorage.setItem("plan", document.getElementById("body").innerHTML);
}

// загрузка
function load() {
    let data = localStorage.getItem("plan");
    if (data) {
        document.getElementById("body").innerHTML = data;
    } else {
        addRow();
    }
}

load();

</script>

</body>
</html>
